name: Cypress Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  cypress-run:
    name: Run ${{ matrix.suite }} tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        suite: [api, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create cypress.env.json from GitHub Secrets
        run: |
          echo '{
            "ADMIN_EMAIL": "${{ secrets.ADMIN_EMAIL }}",
            "ADMIN_PASSWORD": "${{ secrets.ADMIN_PASSWORD }}",
            "ADMIN_NAME": "${{ secrets.ADMIN_NAME }}",
            "API_URL": "https://serverest.dev",
            "BASE_URL": "https://front.serverest.dev"
          }' > cypress.env.json

      - name: Run ${{ matrix.suite }} tests
        run: npm run cypress:run:${{ matrix.suite }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report-${{ matrix.suite }}
          path: cypress/reports/
          retention-days: 30

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ matrix.suite }}
          path: cypress/screenshots/
          retention-days: 7

  merge-reports:
    name: Merge & Publish Report
    runs-on: ubuntu-latest
    needs: cypress-run
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download API report
        uses: actions/download-artifact@v4
        with:
          name: cypress-report-api
          path: cypress/reports/

      - name: Download Frontend report
        uses: actions/download-artifact@v4
        with:
          name: cypress-report-frontend
          path: cypress/reports/

      - name: Generate merged HTML report
        run: npm run report:merge && npm run report:generate

      - name: Upload merged HTML report
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report-merged
          path: cypress/reports/report.html
          retention-days: 30
